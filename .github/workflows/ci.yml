name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  build-macos:
    name: Build macOS release
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build macOS release
        run: flutter build macos --release

      - name: Build macOS app installer
        run: scripts/build_macos_installer.sh --skip-flutter-build

      - name: Upload macOS installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lc-macos-installer
          path: build/installers/lc-macos-*.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows app installer
        shell: pwsh
        run: .\scripts\build_windows_installer.ps1 -SkipFlutterBuild

      - name: Smoke install app-only package
        shell: pwsh
        run: |
          $installer = Resolve-Path 'build\installers\lc-windows-x64-setup.exe'
          $legacyDir = Join-Path $env:LOCALAPPDATA 'DevEnvironmentManager\bin'
          New-Item -ItemType Directory -Force -Path $legacyDir | Out-Null
          Set-Content -Path (Join-Path $legacyDir 'lc.exe') -Value 'legacy'
          $oldUserPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          [Environment]::SetEnvironmentVariable(
            'Path',
            "$legacyDir;$oldUserPath",
            'User'
          )
          $process = Start-Process $installer -Wait -PassThru -ArgumentList @(
            '/VERYSILENT',
            '/SUPPRESSMSGBOXES',
            '/NORESTART'
          )
          if ($process.ExitCode -ne 0) {
            throw "Installer failed with exit code $($process.ExitCode)."
          }
          $app = Join-Path $env:LOCALAPPDATA 'Programs\lc\lc.exe'
          if (-not (Test-Path $app)) { throw 'Installed lc application is missing.' }
          $legacyCli = Join-Path $env:LOCALAPPDATA 'DevEnvironmentManager\bin\lc.exe'
          if (Test-Path $legacyCli) { throw 'The app-only installer left a CLI executable.' }
          $newUserPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          if (($newUserPath -split ';') -contains $legacyDir) {
            throw 'The app-only installer left the legacy CLI PATH entry.'
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lc-windows-installer
          path: build/installers/lc-windows-x64-setup.exe
          if-no-files-found: error
