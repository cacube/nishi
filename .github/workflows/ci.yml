name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  build-macos:
    name: Build macOS release
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build macOS release
        run: flutter build macos --release

      - name: Build joint macOS app and CLI installer
        run: scripts/build_macos_installer.sh --skip-flutter-build

      - name: Upload macOS installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lc-macos-installer
          path: build/installers/lc-macos-*.pkg
          if-no-files-found: error

  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up pinned Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install locked dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build joint Windows app and CLI installer
        shell: pwsh
        run: .\scripts\build_windows_installer.ps1 -SkipFlutterBuild

      - name: Smoke install and run CLI
        shell: pwsh
        run: |
          $installer = Resolve-Path 'build\installers\lc-windows-x64-setup.exe'
          $process = Start-Process $installer -Wait -PassThru -ArgumentList @(
            '/VERYSILENT',
            '/SUPPRESSMSGBOXES',
            '/NORESTART'
          )
          if ($process.ExitCode -ne 0) {
            throw "Installer failed with exit code $($process.ExitCode)."
          }
          $cli = Join-Path $env:LOCALAPPDATA 'DevEnvironmentManager\bin\lc.exe'
          & $cli --version
          if ($LASTEXITCODE -ne 0) { throw 'Installed lc CLI smoke failed.' }

      - name: Upload Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lc-windows-installer
          path: build/installers/lc-windows-x64-setup.exe
          if-no-files-found: error
